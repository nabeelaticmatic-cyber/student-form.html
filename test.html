<!DOCTYPE html>
<html>
<head>
<title>Student Form</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

.form-container{
    width:400px;
    background:white;
    padding:30px;
    margin:40px auto;
    border-radius:8px;
}

h2{
    text-align:center;
}

label{
    font-weight:bold;
}

input, select, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
}

.radio-group input,
.checkbox-group input{
    width:auto;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="form-container">

<h2>Student Form</h2>

<form>

<label for="name">Name</label>
<input type="text" id="name" name="name" required>

<label for="email">Email Address</label>
<input type="email" id="email" name="email" required>

<label for="phone">Phone Number</label>
<input type="tel" id="phone" name="phone" placeholder="123-4567890" pattern="[0-9]{3}-[0-9]{7}" required>

<label for="dob">Date Of Birth</label>
<input type="date" id="dob" name="dob" required>

<label>Gender</label>

<div class="radio-group">
<input type="radio" name="gender" value="Male"> Male<br>
<input type="radio" name="gender" value="Female"> Female
</div>

<br>

<label for="course">Course Selection</label>

<select id="course" name="course">
<option>Web Development</option>
<option>Graphic Design</option>
<option>Digital Marketing</option>
</select>

<label>Skills</label>

<div class="checkbox-group">
<input type="checkbox" name="skills" value="html"> HTML<br>
<input type="checkbox" name="skills" value="css"> CSS<br>
<input type="checkbox" name="skills" value="javascript"> JavaScript<br>
<input type="checkbox" name="skills" value="php"> PHP
</div>

<br>

<label for="address">Address</label>
<textarea id="address" rows="4" placeholder="Write your address here"></textarea>

<label for="file">Upload Profile Picture</label>
<input type="file" id="file">

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
